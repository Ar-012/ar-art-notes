<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问授权 | Ar的艺术理论笔记</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #24313d;
            --muted: #71808f;
            --line: rgba(36, 49, 61, 0.12);
            --panel: rgba(255, 255, 255, 0.9);
            --accent: #1abc9c;
            --accent-dark: #168f78;
            --deep: #2c3e50;
            --error: #d64545;
            --success: #18835f;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 18% 18%, rgba(26, 188, 156, 0.24), transparent 28%),
                radial-gradient(circle at 82% 12%, rgba(52, 152, 219, 0.18), transparent 26%),
                linear-gradient(135deg, #eef4f7 0%, #dfe9ee 46%, #f7faf9 100%);
        }

        .access-card {
            width: min(100%, 420px);
            padding: 34px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 18px;
            box-shadow: 0 24px 70px rgba(36, 49, 61, 0.18);
            backdrop-filter: blur(18px);
        }

        .access-mark {
            width: 58px;
            height: 58px;
            display: grid;
            place-items: center;
            margin-bottom: 22px;
            color: white;
            background: linear-gradient(135deg, var(--deep), var(--accent));
            border-radius: 16px;
            box-shadow: 0 14px 28px rgba(26, 188, 156, 0.28);
            font-size: 1.45rem;
        }

        .access-title {
            font-size: 1.95rem;
            line-height: 1.2;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .access-subtitle {
            color: var(--muted);
            font-size: 0.96rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .access-form {
            display: grid;
            gap: 16px;
        }

        .input-shell {
            position: relative;
        }

        .input-shell i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .access-input {
            width: 100%;
            height: 54px;
            padding: 0 48px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
            font-size: 1.15rem;
            letter-spacing: 0.18em;
            text-align: center;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .access-input:focus {
            outline: none;
            border-color: rgba(26, 188, 156, 0.72);
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.13);
        }

        .access-input.error {
            border-color: rgba(214, 69, 69, 0.8);
            animation: shake 0.42s ease;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            width: 36px;
            height: 36px;
            transform: translateY(-50%);
            border: none;
            border-radius: 10px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
        }

        .toggle-password:hover {
            color: var(--ink);
            background: rgba(36, 49, 61, 0.06);
        }

        .access-button {
            height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            border-radius: 12px;
            color: white;
            background: linear-gradient(135deg, var(--deep), var(--accent-dark));
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 16px 28px rgba(36, 49, 61, 0.18);
        }

        .access-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 34px rgba(36, 49, 61, 0.22);
        }

        .access-message {
            min-height: 22px;
            color: var(--error);
            font-size: 0.9rem;
            text-align: center;
        }

        .access-message.success {
            color: var(--success);
        }

        .access-note {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.7;
        }

        .access-note i {
            color: var(--accent-dark);
            margin-right: 6px;
        }

        .access-footer {
            margin-top: 20px;
            color: rgba(113, 128, 143, 0.82);
            font-size: 0.82rem;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @media (max-width: 480px) {
            .access-card {
                padding: 28px 22px;
                border-radius: 16px;
            }

            .access-title {
                font-size: 1.62rem;
            }
        }
    </style>
</head>
<body>
    <main class="access-card" aria-label="访问授权">
        <div class="access-mark">
            <i class="fas fa-lock"></i>
        </div>
        <h1 class="access-title">Ar's Art Theory</h1>
        <p class="access-subtitle">个人艺术理论笔记。请输入今日访问密码。</p>

        <form class="access-form" id="access-form">
            <div class="input-shell">
                <i class="fas fa-key"></i>
                <input class="access-input" id="password-input" type="password" inputmode="numeric" maxlength="4" autocomplete="current-password" placeholder="0112" required>
                <button class="toggle-password" id="toggle-password" type="button" aria-label="显示或隐藏密码">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <button class="access-button" type="submit">
                <i class="fas fa-unlock"></i>
                进入网站
            </button>
            <p class="access-message" id="access-message" aria-live="polite"></p>
        </form>

        <div class="access-note">
            <p><i class="fas fa-calendar-day"></i>授权仅当天有效，明天需要重新输入。</p>
        </div>

        <div class="access-footer">© Ar's Art Theory</div>
    </main>

    <script>
        const CORRECT_PASSWORD = '0112';
        const ACCESS_KEY = 'art_notes_access';

        function getTodayKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function hasAccessToday() {
            try {
                const accessData = JSON.parse(localStorage.getItem(ACCESS_KEY));
                return accessData && accessData.granted === true && accessData.date === getTodayKey();
            } catch (error) {
                localStorage.removeItem(ACCESS_KEY);
                return false;
            }
        }

        if (hasAccessToday()) {
            window.location.href = 'index.html';
        }

        const form = document.getElementById('access-form');
        const passwordInput = document.getElementById('password-input');
        const message = document.getElementById('access-message');
        const togglePassword = document.getElementById('toggle-password');

        togglePassword.addEventListener('click', function() {
            const icon = this.querySelector('i');
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !isHidden);
            icon.classList.toggle('fa-eye-slash', isHidden);
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            message.classList.remove('success');
            message.textContent = '';

            if (passwordInput.value === CORRECT_PASSWORD) {
                localStorage.setItem(ACCESS_KEY, JSON.stringify({
                    granted: true,
                    date: getTodayKey()
                }));
                message.classList.add('success');
                message.textContent = '验证通过，正在进入...';
                window.location.href = 'index.html';
                return;
            }

            passwordInput.classList.add('error');
            passwordInput.value = '';
            message.textContent = '密码错误，请重试。';
            passwordInput.focus();
            setTimeout(() => passwordInput.classList.remove('error'), 450);
        });

        passwordInput.focus();
    </script>
</body>
</html>
